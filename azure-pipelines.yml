# ═══════════════════════════════════════════════════════════════════════
#  OrbiFreight — Azure DevOps Pipeline
#  CI/CD: GitHub → Azure Container Registry → Azure Container Apps
#  Global Solution 2026/1 — FIAP — RM564434
# ═══════════════════════════════════════════════════════════════════════

trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  ACR_NAME: 'orbifreightacr'
  IMAGE_NAME: 'orbifreight-api-rm564434'
  IMAGE_TAG: '$(Build.BuildId)'
  RESOURCE_GROUP: 'rg-orbifreight'
  CONTAINER_APP_NAME: 'orbifreight-api-rm564434'
  # ⚠️ Service Connections configurados no Azure DevOps (ver README)
  ACR_SERVICE_CONNECTION: 'sc-acr-orbifreight'
  AZURE_SUBSCRIPTION: 'sc-azure-orbifreight'

stages:

  # ── STAGE 1: Build e Push da imagem Docker (AlmaLinux) ──────────────
  - stage: Build
    displayName: 'Build — Imagem AlmaLinux 9 + Java 21'
    jobs:
      - job: BuildAndPush
        displayName: 'Compilar JAR e gerar imagem'
        steps:

          - task: Docker@2
            displayName: 'Login no Azure Container Registry'
            inputs:
              command: login
              containerRegistry: '$(ACR_SERVICE_CONNECTION)'

          - task: Docker@2
            displayName: 'Build + Push da imagem AlmaLinux'
            inputs:
              command: buildAndPush
              repository: '$(IMAGE_NAME)'
              dockerfile: 'Dockerfile'
              containerRegistry: '$(ACR_SERVICE_CONNECTION)'
              tags: |
                $(IMAGE_TAG)
                latest

          - script: |
              echo "✅ Imagem enviada para ACR:"
              echo "   $(ACR_NAME).azurecr.io/$(IMAGE_NAME):$(IMAGE_TAG)"
            displayName: 'Confirmar imagem no ACR'

  # ── STAGE 2: Deploy no Azure Container Apps ──────────────────────────
  - stage: Deploy
    displayName: 'Deploy — Azure Container Apps'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployToAzure
        displayName: 'Atualizar Container App'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:

                - task: AzureCLI@2
                  displayName: 'Atualizar imagem no Container App'
                  inputs:
                    azureSubscription: '$(AZURE_SUBSCRIPTION)'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      az containerapp update \
                        --name $(CONTAINER_APP_NAME) \
                        --resource-group $(RESOURCE_GROUP) \
                        --image $(ACR_NAME).azurecr.io/$(IMAGE_NAME):$(IMAGE_TAG)

                - task: AzureCLI@2
                  displayName: 'Exibir URL pública da API'
                  inputs:
                    azureSubscription: '$(AZURE_SUBSCRIPTION)'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      URL=$(az containerapp show \
                        --name $(CONTAINER_APP_NAME) \
                        --resource-group $(RESOURCE_GROUP) \
                        --query 'properties.configuration.ingress.fqdn' \
                        -o tsv)
                      echo "✅ API disponível em: https://$URL"
                      echo "   Swagger UI: https://$URL/swagger-ui.html"
