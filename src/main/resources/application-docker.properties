# ═══════════════════════════════════════════════════════════════════════
#  OrbiFreight — Perfil Docker / Azure (application-docker.properties)
#  Ativado via: SPRING_PROFILES_ACTIVE=docker
#  Usado local (docker-compose) E em produção (Azure Container Apps)
# ═══════════════════════════════════════════════════════════════════════

spring.application.name=orbifreight

# ── Conexão PostgreSQL ─────────────────────────────────────────────────
# Local: DB_HOST = container postgres-rm564434
# Azure: DB_HOST = orbifreight-db-rm564434.postgres.database.azure.com
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres-rm564434}:${DB_PORT:5432}/${DB_NAME:orbifreight}
spring.datasource.username=${DB_USERNAME:orbiuser}
spring.datasource.password=${DB_PASSWORD:orbipassword123}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ── JWT ────────────────────────────────────────────────────────────────
api.security.token.secret=${JWT_SECRET:orbifreight-jwt-secret-gssolution-2026}

# ── Servidor ───────────────────────────────────────────────────────────
server.port=${APP_PORT:8080}

# ── Swagger ────────────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
